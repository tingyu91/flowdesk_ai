<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head><body>
<div class="card">
  <div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:64px; height:64px; background: var(--ink-900); border-radius: 4px;"></div>
      <div style="text-align:center;"><div style="font-size:12px; font-weight:600;">xs</div><div class="label">4px</div></div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:64px; height:64px; background: var(--ink-900); border-radius: 6px;"></div>
      <div style="text-align:center;"><div style="font-size:12px; font-weight:600;">sm</div><div class="label">6px</div></div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:64px; height:64px; background: var(--ink-900); border-radius: 10px;"></div>
      <div style="text-align:center;"><div style="font-size:12px; font-weight:600;">md</div><div class="label">10px</div></div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:64px; height:64px; background: var(--ink-900); border-radius: 14px;"></div>
      <div style="text-align:center;"><div style="font-size:12px; font-weight:600;">lg</div><div class="label">14px</div></div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:64px; height:64px; background: var(--ink-900); border-radius: 20px;"></div>
      <div style="text-align:center;"><div style="font-size:12px; font-weight:600;">xl</div><div class="label">20px</div></div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:64px; height:64px; background: var(--ink-900); border-radius: 28px;"></div>
      <div style="text-align:center;"><div style="font-size:12px; font-weight:600;">2xl</div><div class="label">28px</div></div>
    </div>
  </div>
  <div style="font-size: 13px; color: var(--fg-2);">Inputs use <code style="font-family:var(--font-mono); font-size:12px;">sm</code> · buttons <code style="font-family:var(--font-mono); font-size:12px;">md</code> · cards <code style="font-family:var(--font-mono); font-size:12px;">lg</code> · hero panels <code style="font-family:var(--font-mono); font-size:12px;">xl–2xl</code>. Full pill is for badges only.</div>
</div>
</body></html>
