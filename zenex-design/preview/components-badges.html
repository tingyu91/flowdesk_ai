<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; padding: 3px 9px; border-radius: 999px; line-height: 1.5;}
.dot { width: 6px; height: 6px; border-radius: 50%;}
</style>
</head><body>
<div class="card">
  <div style="display: flex; flex-wrap: wrap; gap: 8px;">
    <span class="badge" style="background: var(--success-bg); color: var(--jade-700);"><span class="dot" style="background: var(--success);"></span>Resolved</span>
    <span class="badge" style="background: var(--warning-bg); color: var(--amber-600);"><span class="dot" style="background: var(--warning);"></span>At risk</span>
    <span class="badge" style="background: var(--danger-bg); color: var(--coral-600);"><span class="dot" style="background: var(--danger);"></span>Failed</span>
    <span class="badge" style="background: var(--info-bg); color: var(--sky-600);"><span class="dot" style="background: var(--info);"></span>In review</span>
    <span class="badge" style="background: var(--bg-sunken); color: var(--fg-2);"><span class="dot" style="background: var(--fg-3);"></span>Draft</span>
  </div>
  <div style="display: flex; flex-wrap: wrap; gap: 8px;">
    <span class="badge" style="background: var(--ink-900); color: var(--bone-100);">PRO</span>
    <span class="badge" style="background: var(--bg-sunken); color: var(--fg-1); font-family: var(--font-mono); font-size: 11px;">v2.18.3</span>
    <span class="badge" style="background: var(--accent-soft); color: var(--accent-soft-fg); font-family: var(--font-mono); font-size: 11px;">agent · prod</span>
    <span class="badge" style="background: transparent; color: var(--fg-2); border: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px;">⌘ K</span>
  </div>
</div>
</body></html>
