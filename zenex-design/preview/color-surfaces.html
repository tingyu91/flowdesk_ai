<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head><body>
<div class="card">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
    <div style="background: var(--bone-100); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 18px 18px 14px; min-height: 120px; display:flex; flex-direction:column; justify-content:flex-end;">
      <div style="font-size: 17px; font-weight: 600; color: var(--ink-900);">Bone 100</div>
      <div class="label" style="font-family: var(--font-mono); color: var(--ink-500);">#FAFAF7 · primary surface</div>
    </div>
    <div style="background: var(--ink-950); border-radius: var(--radius-md); padding: 18px 18px 14px; min-height: 120px; display:flex; flex-direction:column; justify-content:flex-end;">
      <div style="font-size: 17px; font-weight: 600; color: var(--bone-100);">Ink 950</div>
      <div class="label" style="font-family: var(--font-mono); color: var(--ink-300);">#060A14 · dark surface</div>
    </div>
  </div>
</div>
</body></html>
