<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css">
<style>
.btn { font-family: var(--font-sans); font-size: 14px; font-weight: 500; border-radius: 10px; padding: 9px 16px; border: 1px solid transparent; line-height: 1;}
</style>
</head><body>
<div class="card">
  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; align-items: center;">
    <div style="text-align:center;"><button class="btn" style="background: var(--jade-400); color: var(--ink-950);">Default</button><div class="label" style="margin-top:8px;">rest</div></div>
    <div style="text-align:center;"><button class="btn" style="background: var(--jade-500); color: var(--ink-950);">Hover</button><div class="label" style="margin-top:8px;">+1 step</div></div>
    <div style="text-align:center;"><button class="btn" style="background: var(--jade-600); color: var(--ink-950); box-shadow: inset 0 0 0 1px rgba(0,0,0,0.18);">Press</button><div class="label" style="margin-top:8px;">+2 step, inset</div></div>
    <div style="text-align:center;"><button class="btn" style="background: var(--jade-400); color: var(--ink-950); box-shadow: 0 0 0 3px rgba(0, 212, 160, 0.35);">Focus</button><div class="label" style="margin-top:8px;">jade ring</div></div>
  </div>
  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; align-items: center;">
    <div style="text-align:center;"><button class="btn" style="background: var(--bg-elev-1); color: var(--fg-1); border-color: var(--border);">Default</button></div>
    <div style="text-align:center;"><button class="btn" style="background: var(--bg-sunken); color: var(--fg-1); border-color: var(--border);">Hover</button></div>
    <div style="text-align:center;"><button class="btn" style="background: var(--bg-elev-1); color: var(--fg-4); border-color: var(--border-subtle); opacity: 0.5;">Disabled</button></div>
    <div style="text-align:center;"><button class="btn" style="background: var(--bg-elev-1); color: var(--fg-1); border-color: var(--ink-900);"><span style="display:inline-block;width:12px;height:12px;border:2px solid var(--ink-300); border-top-color: var(--ink-900); border-radius:50%; animation: spin 0.8s linear infinite;"></span> Loading</button></div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg);}}</style>
</div>
</body></html>
