<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head><body>
<div class="card">
  <div style="display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px;">
    <div style="height: 80px; background: var(--ink-50); border: 1px solid var(--border-subtle); border-radius: 6px 0 0 6px;"></div>
    <div style="height: 80px; background: var(--ink-100);"></div>
    <div style="height: 80px; background: var(--ink-200);"></div>
    <div style="height: 80px; background: var(--ink-300);"></div>
    <div style="height: 80px; background: var(--ink-400);"></div>
    <div style="height: 80px; background: var(--ink-500);"></div>
    <div style="height: 80px; background: var(--ink-600);"></div>
    <div style="height: 80px; background: var(--ink-700);"></div>
    <div style="height: 80px; background: var(--ink-800);"></div>
    <div style="height: 80px; background: var(--ink-900);"></div>
    <div style="height: 80px; background: var(--ink-950); border-radius: 0 6px 6px 0;"></div>
  </div>
  <div style="display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-3);">
    <div>50</div><div>100</div><div>200</div><div>300</div><div>400</div><div>500</div><div>600</div><div>700</div><div>800</div><div>900</div><div>950</div>
  </div>
  <div style="font-size: 13px; color: var(--fg-2);">Ink · cool near-black ramp. Drives text hierarchy, borders, dividers, and dark surfaces.</div>
</div>
</body></html>
