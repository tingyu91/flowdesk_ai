<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head><body>
<div class="card" style="background: var(--bg);">
  <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; padding: 12px 8px;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width:88px; height:88px; background:#fff; border-radius:10px; box-shadow: 0 1px 1px rgba(11, 17, 32, 0.04);"></div>
      <div style="text-align:center;"><div style="font-size:12px; font-weight:600;">xs</div><div class="label">1px ambient</div></div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width:88px; height:88px; background:#fff; border-radius:10px; box-shadow: 0 1px 2px rgba(11, 17, 32, 0.06), 0 1px 1px rgba(11, 17, 32, 0.04);"></div>
      <div style="text-align:center;"><div style="font-size:12px; font-weight:600;">sm</div><div class="label">cards default</div></div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width:88px; height:88px; background:#fff; border-radius:10px; box-shadow: 0 6px 14px -6px rgba(11, 17, 32, 0.12), 0 2px 4px rgba(11, 17, 32, 0.05);"></div>
      <div style="text-align:center;"><div style="font-size:12px; font-weight:600;">md</div><div class="label">menus, popovers</div></div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width:88px; height:88px; background:#fff; border-radius:10px; box-shadow: 0 18px 36px -16px rgba(11, 17, 32, 0.18), 0 4px 10px rgba(11, 17, 32, 0.05);"></div>
      <div style="text-align:center;"><div style="font-size:12px; font-weight:600;">lg</div><div class="label">modals</div></div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <div style="width:88px; height:88px; background:#fff; border-radius:10px; box-shadow: 0 32px 60px -24px rgba(11, 17, 32, 0.22), 0 8px 16px rgba(11, 17, 32, 0.06);"></div>
      <div style="text-align:center;"><div style="font-size:12px; font-weight:600;">xl</div><div class="label">hero, sparingly</div></div>
    </div>
  </div>
  <div style="font-size: 13px; color: var(--fg-2); padding: 0 8px;">All shadows are ink-based and never tinted. We lean on borders, not floating cards.</div>
</div>
</body></html>
