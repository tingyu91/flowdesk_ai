      <div style="font-size: 13px; color: var(--ink-200); line-height: 1.55;">Continuous signal. Real-time response. Audit-ready.</div>
    </div>
  </div>
  <div style="font-size: 13px; color: var(--fg-2);">Cards · 14px radius · 1px subtle border · shadow-sm. Dark variant uses ink-900 with no border.</div>
