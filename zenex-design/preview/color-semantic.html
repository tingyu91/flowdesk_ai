<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head><body>
<div class="card">
  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
    <div style="border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden;">
      <div style="height: 56px; background: var(--success);"></div>
      <div style="padding: 10px 12px; background: var(--success-bg);">
        <div style="font-size: 13px; font-weight: 600; color: var(--jade-700);">Success</div>
        <div class="label" style="font-family: var(--font-mono);">resolved · ok</div>
      </div>
    </div>
    <div style="border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden;">
      <div style="height: 56px; background: var(--warning);"></div>
      <div style="padding: 10px 12px; background: var(--warning-bg);">
        <div style="font-size: 13px; font-weight: 600; color: var(--amber-600);">Warning</div>
        <div class="label" style="font-family: var(--font-mono);">at risk · queue</div>
      </div>
    </div>
    <div style="border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden;">
      <div style="height: 56px; background: var(--danger);"></div>
      <div style="padding: 10px 12px; background: var(--danger-bg);">
        <div style="font-size: 13px; font-weight: 600; color: var(--coral-600);">Danger</div>
        <div class="label" style="font-family: var(--font-mono);">failed · breach</div>
      </div>
    </div>
    <div style="border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden;">
      <div style="height: 56px; background: var(--info);"></div>
      <div style="padding: 10px 12px; background: var(--info-bg);">
        <div style="font-size: 13px; font-weight: 600; color: var(--sky-600);">Info</div>
        <div class="label" style="font-family: var(--font-mono);">note · update</div>
      </div>
    </div>
  </div>
  <div style="font-size: 13px; color: var(--fg-2);">State colors signal — they never decorate. A page should never look "colorful."</div>
</div>
</body></html>
