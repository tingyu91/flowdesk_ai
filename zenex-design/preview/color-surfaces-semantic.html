<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head><body>
<div class="card">
  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; align-items: stretch;">
    <div style="background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; min-height: 92px; display:flex; flex-direction:column; justify-content:space-between;">
      <span class="label" style="color: var(--fg-3);">bg</span>
      <span class="label" style="font-family: var(--font-mono); color: var(--fg-2);">bone-100</span>
    </div>
    <div style="background: var(--bg-elev-1); border: 1px solid var(--border); border-radius: 10px; padding: 14px; min-height: 92px; display:flex; flex-direction:column; justify-content:space-between;">
      <span class="label" style="color: var(--fg-3);">bg-elev-1</span>
      <span class="label" style="font-family: var(--font-mono); color: var(--fg-2);">#FFFFFF</span>
    </div>
    <div style="background: var(--bg-sunken); border: 1px solid var(--border); border-radius: 10px; padding: 14px; min-height: 92px; display:flex; flex-direction:column; justify-content:space-between;">
      <span class="label" style="color: var(--fg-3);">bg-sunken</span>
      <span class="label" style="font-family: var(--font-mono); color: var(--fg-2);">bone-200</span>
    </div>
    <div style="background: var(--bg-inverse); border-radius: 10px; padding: 14px; min-height: 92px; display:flex; flex-direction:column; justify-content:space-between;">
      <span class="label" style="color: rgba(255,255,255,0.5);">bg-inverse</span>
      <span class="label" style="font-family: var(--font-mono); color: var(--bone-100);">ink-900</span>
    </div>
  </div>
</div>
</body></html>
