<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"></head><body>
<div class="card">
  <div style="display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px;">
    <div style="height: 80px; background: var(--jade-50); border-radius: 6px 0 0 6px;"></div>
    <div style="height: 80px; background: var(--jade-100);"></div>
    <div style="height: 80px; background: var(--jade-200);"></div>
    <div style="height: 80px; background: var(--jade-300);"></div>
    <div style="height: 80px; background: var(--jade-400); position: relative;"><span style="position:absolute; top:6px; right:6px; font-size:10px; font-family:var(--font-mono); color:var(--ink-900); background:rgba(255,255,255,0.7); padding:1px 4px; border-radius:3px;">brand</span></div>
    <div style="height: 80px; background: var(--jade-500);"></div>
    <div style="height: 80px; background: var(--jade-600);"></div>
    <div style="height: 80px; background: var(--jade-700);"></div>
    <div style="height: 80px; background: var(--jade-800);"></div>
    <div style="height: 80px; background: var(--jade-900); border-radius: 0 6px 6px 0;"></div>
  </div>
  <div style="display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-3);">
    <div>50</div><div>100</div><div>200</div><div>300</div><div style="color:var(--fg-1); font-weight:600;">400</div><div>500</div><div>600</div><div>700</div><div>800</div><div>900</div>
  </div>
  <div style="font-size: 13px; color: var(--fg-2);">Jade · the only decorative accent. 400 is the brand mark; 500/600 are hover/press; 50–100 for backgrounds.</div>
</div>
</body></html>
