<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Zenex Flow — Intelligent automation for the modern IT desk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="../../assets/logo-mark.svg">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="kit.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root" class="site-shell"></div>

  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="SolutionsGrid.jsx"></script>
  <script type="text/babel" src="StatsStrip.jsx"></script>
  <script type="text/babel" src="HowItWorks.jsx"></script>
  <script type="text/babel" src="ContactForm.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      return (
        <>
          <Nav />
          <Hero />
          <StatsStrip />
          <SolutionsGrid />
          <HowItWorks />
          <ContactForm />
          <Footer />
        </>
      );
    }
    // Wait briefly for sibling JSX scripts (loaded async) to register on window.
    (function mount(){
      if (window.Nav && window.Hero && window.SolutionsGrid && window.StatsStrip && window.HowItWorks && window.ContactForm && window.Footer) {
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
      } else {
        setTimeout(mount, 50);
      }
    })();
  </script>
</body>
</html>
